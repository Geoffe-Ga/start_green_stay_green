# Read the Docs configuration file for Start Green Stay Green
# See: https://docs.readthedocs.io/en/stable/config-file/v2/

version: 2

# Build documentation from the current directory
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Python dependencies for documentation building
python:
  version: 3.11
  install:
    - requirements: requirements-dev.txt
    - method: pip
      path: .

# Sphinx configuration
sphinx:
  configuration: docs/conf.py
  builder: html
  fail_on_warning: false

# PDF generation
formats:
  - pdf
  - epub

# Documentation source directories
doc_type: sphinx

# File encoding
encoding: utf-8

# Source repository for Read the Docs
repository:
  url: https://github.com/Geoffe-Ga/start_green_stay_green
  type: git
  branch: main

# Build on push to main and release tags
build_extra_requirements:
  - docs

# Subprojects (if any)
# subprojects: ...

# Environment variables for builds
env:
  PYTHONUNBUFFERED: 1
