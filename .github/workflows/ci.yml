name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * *'  # Daily security scan

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  COVERAGE_THRESHOLD: 90

jobs:
  # Job 1: Code Quality
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run linting
        run: ./scripts/lint.sh --check

      - name: Run format check
        run: ./scripts/format.sh --check

      - name: Run type checking
        run: ./scripts/typecheck.sh

      - name: Run security checks
        run: ./scripts/security.sh

      - name: Run complexity analysis
        run: ./scripts/complexity.sh

      - name: Track job timing
        if: always()
        run: echo "$SECONDS" > quality-job-timing.txt

      - name: Upload job timing
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: job-timings-quality
          path: quality-job-timing.txt
          retention-days: 7

  # Job 2: Tests with Matrix
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: ./scripts/test.sh --unit --coverage --ci

      - name: Clean up test artifacts before integration tests
        if: always()
        run: |
          echo "Cleaning up test artifacts..."
          # Remove test project directories
          rm -rf my_project MagicMock *_project test-project 2>/dev/null || true
          # Remove pytest cache that might interfere
          rm -rf .pytest_cache 2>/dev/null || true
          # Remove test artifact files created by generators
          if [ -f tests/test_main.py ]; then
            echo "Removing tests/test_main.py artifact..."
            rm -f tests/test_main.py
          fi
          # Restore original pyproject.toml from git (in case test overwrote it)
          echo "Restoring original pyproject.toml from git..."
          git checkout HEAD -- pyproject.toml
          # Remove any OTHER pyproject.toml files in subdirectories
          find . -maxdepth 2 -name "pyproject.toml" ! -path "./pyproject.toml" -delete 2>/dev/null || true
          # Verify cleanup
          echo "Verification:"
          ls -la | grep -E "my_project|MagicMock|test-project" || echo "✓ No test artifact directories"
          [ -f tests/test_main.py ] && echo "⚠ tests/test_main.py still exists!" || echo "✓ tests/test_main.py removed"
          echo "✓ Checking pyproject.toml has correct coverage target:"
          grep "cov=start_green_stay_green" pyproject.toml && echo "✓ pyproject.toml is correct" || echo "⚠ pyproject.toml may be corrupted!"
          echo "✓ Cleanup complete"

      - name: Debug pytest configuration before integration tests
        run: |
          echo "=== Pytest Configuration Debug ==="
          pytest --markers | grep -E "e2e|integration|flaky_in_ci" || echo "⚠ Custom markers NOT found!"
          echo "=== Checking pyproject.toml markers section ==="
          grep -A 10 "^\[tool.pytest.ini_options\]" pyproject.toml | head -15
          echo "=== Python/Pytest Version ==="
          python --version
          pytest --version

      - name: Run integration tests
        run: ./scripts/test.sh --integration --ci

      - name: Extract coverage percentage
        if: matrix.python-version == '3.11'
        run: |
          COVERAGE=$(coverage report | grep TOTAL | awk '{print $NF}' | sed 's/%//')
          echo "COVERAGE_PERCENTAGE=$COVERAGE" >> $GITHUB_ENV
          echo "Coverage: $COVERAGE%" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        continue-on-error: true  # Don't fail CI if codecov has issues
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            junit.xml
            htmlcov/

      - name: Track job timing
        if: always()
        run: echo "$SECONDS" > test-py${{ matrix.python-version }}-job-timing.txt

      - name: Upload job timing
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: job-timings-test-py${{ matrix.python-version }}
          path: test-py${{ matrix.python-version }}-job-timing.txt
          retention-days: 7

  # Job 2b: Windows test leg (#380, windows-compat epic #378, tracer T1).
  #
  # Design decisions (documented per #380):
  # - Separate job, not a matrix axis: the ubuntu matrix and its coverage
  #   gating stay untouched, and the matrix stays legible. Coverage
  #   thresholds are owned by the ubuntu leg, so this job runs pytest
  #   WITHOUT coverage flags — gating coverage here too would double-gate
  #   the same threshold on two platforms.
  # - Single Python version (the repo default): this leg asserts
  #   cross-platform correctness, not Python-version compatibility, which
  #   the ubuntu matrix already covers.
  # - Scope: unit + integration suites via the same marker expressions
  #   scripts/test.sh --unit/--integration --ci uses (flaky_in_ci excluded
  #   exactly as on ubuntu). The e2e suite shells out to bash scripts and
  #   pre-commit hooks that are POSIX-only today; it is excluded by its
  #   existing marker (applied by tests/e2e/conftest.py), NOT by skip
  #   decorations on individual tests. Windows e2e coverage is follow-up
  #   work in epic #378.
  # - The suites run through the cross-platform gate runner
  #   (`python -m start_green_stay_green.gates`, #382) — the exact same
  #   gate logic the POSIX scripts/*.sh wrappers delegate to — instead
  #   of bash scripts, which assume a POSIX venv layout (.venv/bin).
  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    needs: quality
    # Cap a hung Windows runner; comfortably above the observed ~8 min
    # full unit+integration runtime.
    timeout-minutes: 30
    env:
      # Windows Python defaults text I/O to the legacy ANSI code page
      # (cp1252). The suite and generated content are UTF-8 (script
      # banners contain emoji/unicode), so enable Python's UTF-8 mode
      # (PEP 540) for the pytest process and the sgsg subprocesses it
      # spawns (they inherit the environment).
      PYTHONUTF8: '1'
    steps:
      # Windows git defaults to core.autocrlf=true, which would check the
      # repo out with CRLF endings and break tests that compare file
      # content against "\n" literals. Configure before checkout.
      - name: Force LF line endings on checkout
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # #382: the lint and test gates run through the cross-platform
      # runner (the same logic scripts/*.sh delegates to on POSIX), so
      # this leg verifies the documented Windows entrypoint end-to-end.
      # Running the gates here REPLACES the direct pytest invocations —
      # the marker selection is identical and the suites must not run
      # twice.
      - name: Run lint gate through cross-platform runner
        run: python -m start_green_stay_green.gates lint

      - name: Run unit tests through cross-platform runner
        # Same marker selection as `./scripts/test.sh --unit --ci`.
        run: python -m start_green_stay_green.gates test --unit --ci

      - name: Run integration tests through cross-platform runner
        # Same marker selection as `./scripts/test.sh --integration --ci`.
        run: python -m start_green_stay_green.gates test --integration --ci

      - name: Track job timing
        if: always()
        # $SECONDS is a bash builtin, so this step pins shell: bash
        # (Git Bash on the Windows runner) like the POSIX jobs use.
        shell: bash
        run: echo "$SECONDS" > test-windows-job-timing.txt

      - name: Upload job timing
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: job-timings-test-windows
          path: test-windows-job-timing.txt
          retention-days: 7

  # Job 3: Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run full security checks
        run: ./scripts/security.sh --full

      - name: Run dependency audit
        run: ./scripts/audit-deps.sh

      - name: Track job timing
        if: always()
        run: echo "$SECONDS" > security-job-timing.txt

      - name: Upload job timing
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: job-timings-security
          path: security-job-timing.txt
          retention-days: 7

  # Job 5: Dependency Review (PR only)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true  # Skip if not available (requires GitHub Advanced Security)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          fail-on-severity: moderate

      - name: Track job timing
        if: always()
        run: echo "$SECONDS" > dependency-review-job-timing.txt

      - name: Upload job timing
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: job-timings-dependency-review
          path: dependency-review-job-timing.txt
          retention-days: 7

  # Job 6: Coverage Artifacts & Badge Generation
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # Cache the whole virtualenv so ensure_venv() in scripts/common.sh
      # activates a prebuilt .venv instead of creating a temporary venv
      # and reinstalling every dependency from scratch on each run.
      - name: Restore cached virtualenv
        id: venv-cache
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'pyproject.toml') }}

      - name: Install dependencies
        run: |
          if [ "${{ steps.venv-cache.outputs.cache-hit }}" != "true" ]; then
            python -m venv .venv
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -e . -r requirements-dev.txt
          fi
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # No --html: the metrics below come from `coverage report` terminal
      # output, so rendering every source file to HTML is wasted work in CI.
      # The flag remains available for local use.
      - name: Generate coverage report
        run: ./scripts/coverage.sh

      - name: Extract coverage metrics
        id: coverage
        run: |
          COVERAGE=$(coverage report | grep TOTAL | awk '{print $NF}' | sed 's/%//')
          echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT
          # Determine status
          if (( $(echo "$COVERAGE >= 95" | bc -l) )); then
            STATUS="excellent"
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            STATUS="good"
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            STATUS="fair"
            COLOR="yellow"
          else
            STATUS="poor"
            COLOR="red"
          fi
          echo "status=${STATUS}" >> $GITHUB_OUTPUT
          echo "color=${COLOR}" >> $GITHUB_OUTPUT

      - name: Generate badge JSON
        env:
          COVERAGE_VALUE: ${{ steps.coverage.outputs.coverage }}
          COVERAGE_COLOR: ${{ steps.coverage.outputs.color }}
        run: |
          mkdir -p badges
          jq -n \
            --arg msg "${COVERAGE_VALUE}%" \
            --arg color "$COVERAGE_COLOR" \
            '{schemaVersion: 1, label: "coverage", message: $msg, color: $color}' \
            > badges/coverage.json
          cat > badges/tests.json << 'EOF'
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "passing",
            "color": "brightgreen"
          }
          EOF
          cat > badges/quality.json << 'EOF'
          {
            "schemaVersion": 1,
            "label": "quality",
            "message": "maximum",
            "color": "brightgreen"
          }
          EOF
          echo "Badge files generated:"
          ls -la badges/

      - name: Upload badge artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-badges
          path: badges/
          retention-days: 30

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          COVERAGE_VALUE: ${{ steps.coverage.outputs.coverage }}
          COVERAGE_STATUS: ${{ steps.coverage.outputs.status }}
          COVERAGE_THRESHOLD_VALUE: ${{ env.COVERAGE_THRESHOLD }}
        with:
          script: |
            const coverage = process.env.COVERAGE_VALUE;
            const status = process.env.COVERAGE_STATUS;
            const threshold = process.env.COVERAGE_THRESHOLD_VALUE;

            // Determine pass/fail emoji
            const passEmoji = coverage >= threshold ? "✅" : "⚠️";

            const comment = `## Coverage Report ${passEmoji}

            **Coverage**: ${coverage}% (Threshold: ${threshold}%)
            **Status**: ${status}

            | Metric | Value |
            |--------|-------|
            | Coverage | ${coverage}% |
            | Threshold | ${threshold}% |
            | Status | ${status} |

            [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            // Find existing coverage comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(comment =>
              comment.body.includes('## Coverage Report')
            );

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

      - name: Track job timing
        if: always()
        run: echo "$SECONDS" > coverage-job-timing.txt

      - name: Upload job timing
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: job-timings-coverage
          path: coverage-job-timing.txt
          retention-days: 7

  # Job 7: Job timing summary
  timing-summary:
    name: Job Timing Summary
    runs-on: ubuntu-latest
    needs: [quality, test, test-windows, security, coverage]
    if: always()
    steps:
      - name: Download all timing artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: job-timings-*
          path: timings

      - name: Generate timing report
        run: |
          echo "## CI Job Timing Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Duration (seconds) |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------------------|" >> $GITHUB_STEP_SUMMARY

          for file in timings/job-timings-*/*.txt; do
            if [ -f "$file" ]; then
              JOB_NAME=$(basename "$file" -job-timing.txt | tr '-' ' ')
              DURATION=$(cat "$file")
              echo "| $JOB_NAME | $DURATION |" >> $GITHUB_STEP_SUMMARY
            fi
          done
