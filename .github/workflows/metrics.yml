name: Quality Metrics Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # For GitHub Pages deployment

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Check documentation coverage
        run: |
          interrogate -v start_green_stay_green/ > docs-report.txt 2>&1 || true

      - name: Generate metrics.json via script mode
        run: |
          python scripts/collect_metrics.py \
            --project-name start-green-stay-green \
            --output docs/metrics.json \
            --metrics-mode script \
            --scripts-dir scripts/ \
            --docs-file docs-report.txt

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: false

      - name: Summary
        run: |
          echo "## 📊 Metrics Dashboard Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard URL: https://geoffe-ga.github.io/start_green_stay_green/dashboard.html" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Latest Metrics" >> $GITHUB_STEP_SUMMARY
          cat docs/metrics.json | jq -r '.metrics | to_entries | .[] | "- **\(.key)**: \(.value)"' >> $GITHUB_STEP_SUMMARY || true
